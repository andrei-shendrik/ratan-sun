# Определение файлов, подлежащих обработке
[file_filters]
allowed_patterns = [
    '(?i)^\d{4}-\d{2}-\d{2}_\d{6}_sun[+-]?\d{1,2}\.bin(\.gz)?$'
]
forbidden_patterns = [
    '(?i)AR'
]

# Настройки логирования
[logging]
log_format = '%(asctime)s [%(levelname)s] [%(module)s] %(message)s'
date_format = '%Y-%m-%d %H:%M:%S'
rotation_size_mb = 10
backup_count = 5

[[logging.handlers]]
level = "DEBUG"
filename = "debug.log"

[[logging.handlers]]
level = "INFO"
filename = "info.log"

[[logging.handlers]]
level = "WARNING"
filename = "warning.log"

[[logging.handlers]]
level = "ERROR"
filename = "error.log"

[[logging.handlers]]
level = "CRITICAL"
filename = "critical.log"