# Prod
services:
  postgres-db:
    image: postgres:18
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  bin2fits_fast_1_3_daemon:
    # имя образа должно совпадать с именем в скрипте для GitHub Actions, откуда он его берет
    image: ghcr.io/${REPOSITORY_OWNER:-andrei-shendrik}/ratan-sun-bin2fits-fast-1-3ghz:${PROJECT_VERSION:-latest}
    restart: always
    env_file:
      - .env
    environment:
      # внутри контейнера DB_HOST="postgres-db"
      - DB_HOST=postgres-db
    depends_on:
      - postgres-db # ожидание старта БД
    # Прокидываем пути из .env в контейнер (если они ссылаются на реальные папки ОС)
    volumes:
      - ${FAST_ACQ_1_3GHZ_BIN_ARCHIVE}:/app/data/obs/ratan-600/fast-acquisition-1-3ghz/raw/sun
      - ${FAST_ACQ_1_3GHZ_FITS_ARCHIVE}:/app/data/obs/ratan-600/fast-acquisition-1-3ghz/fits/sun
      - ${BIN2FITS_FAST_ACQ_1_3GHZ_LOG_DIR}:/app/main/logs/bin2fits_fast_1_3
    command: ["--daemon"]

  bin2fits_fast_1_3: #_cli
    image: ghcr.io/${REPOSITORY_OWNER:-andrei-shendrik}/ratan-sun-bin2fits-fast-1-3ghz:${PROJECT_VERSION:-latest}
    restart: "no" # контейнер должен исчезнуть после выполнения задачи
    env_file:
      - .env
    environment:
      - DB_HOST=postgres-db
    depends_on:
      - postgres-db
    volumes:
      - ${FAST_ACQ_1_3GHZ_BIN_ARCHIVE}:/app/data/obs/ratan-600/fast-acquisition-1-3ghz/raw/sun
      - ${FAST_ACQ_1_3GHZ_FITS_ARCHIVE}:/app/data/obs/ratan-600/fast-acquisition-1-3ghz/fits/sun
      - ${BIN2FITS_FAST_ACQ_1_3GHZ_LOG_DIR}:/app/main/logs/bin2fits_fast_1_3
    # нет command, докер использует дефолтный из Dockerfile (CMD ["--help"])
    # профиль "cli", чтобы этот контейнер игнорировался при "docker compose up -d"
    profiles:
      - cli

