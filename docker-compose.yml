#      - ${FAST_ACQ_1_3GHZ_JSON_DATA}:/app/data/json/ratan-600/fast-acquisition-1-3ghz:ro # режим Read Only (ro)

  frontend:
    image: ghcr.io/${REPOSITORY_OWNER:-andrei-shendrik}/ratan-sun-frontend:${PROJECT_VERSION:-latest}
    restart: always
    depends_on:
      - backend
    ports:
      - "127.0.0.1:8080:80" # привязка 8080 только к localhost, чтобы снаружи никто не мог обойти Apache

volumes:
  pgdata: