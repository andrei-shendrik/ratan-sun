  react-web:
    image: ghcr.io/${REPOSITORY_OWNER:-andrei-shendrik}/ratan-sun-react-web:${PROJECT_VERSION:-latest}
    restart: always
    ports:
      - "127.0.0.1:8080:80" # привязка 8080 только к localhost, чтобы снаружи никто не мог обойти Apache

